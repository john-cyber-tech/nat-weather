<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}National Weather Reader{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo">
      <span class="logo-icon">🌦️</span>
      <span class="logo-text">National Weather Reader</span>
    </a>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>Weather data provided by the <a href="https://www.weather.gov" target="_blank" rel="noopener">National Weather Service</a></p>
  </footer>
</body>
</html>
